<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daisy's | 22 & Beyond</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@300;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --deep-pink: #ff0054;
            --bg: #0a0a0a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed; /* Prevents mobile scroll lag */
        }

        /* GPU Layer for Particles */
        #particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            transform: translateZ(0); 
        }

        #viewport {
            perspective: 2000px;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .section {
            position: absolute;
            width: 90%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            text-align: center;
            /* Force GPU to handle transitions */
            transform: translate3d(0,0,0);
            will-change: transform, opacity;
            backface-visibility: hidden;
        }

        /* --- STAGE 1: LOGIN --- */
        #stage1 { visibility: visible; }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 450px;
        }

        input {
            background: transparent; 
            border: none;
            border-bottom: 2px solid var(--deep-pink);
            color: white;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            text-align: center;
            outline: none;
            font-family: 'Syncopate', sans-serif;
            width: 80%;
            margin-top: 20px;
        }

        /* --- STAGE 2: 3D GRID --- */
        .photo-space {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 900px;
            transform: rotateX(15deg) rotateY(-10deg);
            transform-style: preserve-3d;
        }
        @media (min-width: 768px) {
            .photo-space { grid-template-columns: repeat(4, 1fr); gap: 20px; }
        }

        .b-img {
            width: 100%;
            aspect-ratio: 3/4;
            background: #222;
            border: 2px solid white;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* Vital for mobile video performance */
            will-change: transform;
            transform: translateZ(0);
        }

        /* --- STAGE 3: HERO --- */
        .number-22 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(8rem, 25vw, 15rem);
            background: linear-gradient(to bottom, #fff, var(--deep-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px var(--deep-pink));
        }
        .avatar { margin-top: -60px; z-index: 10; }
        .avatar img {
            width: clamp(120px, 25vw, 180px);
            height: clamp(120px, 25vw, 180px);
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid var(--gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
        }

        /* --- STAGE 4: TEXT --- */
        .final-text { font-family: 'Dancing Script', cursive; font-size: clamp(2rem, 8vw, 4rem); line-height: 1.2; }
        .pidgin {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(0.9rem, 4vw, 1.3rem);
            letter-spacing: 3px;
            color: var(--gold);
            margin-top: 30px;
            text-transform: uppercase;
            font-weight: 600;
        }

        button {
            margin-top: 40px;
            background: var(--deep-pink);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-family: 'Syncopate';
            font-size: 0.7rem;
            cursor: pointer;
            letter-spacing: 2px;
            transform: translateZ(0); /* GPU acceleration for button hover */
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto">
        <source src='./music.mp3' type="audio/mpeg">
    </audio>

    <canvas id="particleCanvas"></canvas>

    <div id="viewport">
        <div id="stage1" class="section">
            <div class="glass-card">
                <h2 style="letter-spacing: 5px; font-size: 0.9rem;">ACCESSING HER HEART...</h2>
                <input type="text" id="nameKey" placeholder="NAME?" autocomplete="off">
            </div>
        </div>

        <div id="stage2" class="section">
            <h1 style="font-family: 'Syncopate'; font-size: clamp(1.2rem, 5vw, 3rem); margin-bottom: 30px;">DAISY'S WORLD</h1>
            <div class="photo-space" id="photoSpace"></div>
            <button onclick="toStage3()">KNOW MORE?</button>
        </div>

        <div id="stage3" class="section">
            <div class="number-22">22</div>
            <div class="avatar"><img src="./profile.jpg" alt="DAISY"></div>
            <h2 style="font-family: 'Syncopate'; font-size: 1rem; margin-top: 20px;">CHAPTER TWENTY TWO</h2>
            <button onclick="toStage4()">HONESTLY</button>
        </div>

        <div id="stage4" class="section">
            <div class="final-text">"You're hard not to love... <br>actually, it's impossible."</div>
            <div class="pidgin">the first day i saw my eyes on you i'm very fall in love... <br>see right now na only you fit quench my fire 😂</div>
            <p style="margin-top: 50px; opacity: 0.7;">Enjoy your day, ESPOSA❤️. ✨</p>
        </div>
    </div>

    <script>
        // 1. Optimized Particle Logic (Still 50 particles!)
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d', { alpha: true }); // Faster rendering mode
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 15 + 5;
                this.speed = Math.random() * 1.5 + 0.5; // Slightly slower for smoother look
                this.content = Math.random() > 0.5 ? '❤️' : '✨';
                this.opacity = Math.random() * 0.6 + 0.2;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px serif`;
                ctx.fillText(this.content, this.x, this.y);
            }
        }

        // FULL 50 Particles
        for(let i=0; i<50; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Using a for-loop instead of forEach (Faster on mobile)
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }
        animate();

        // 2. Optimized Video Grid
        const grid = document.getElementById('photoSpace');
        const myVideos = ["./daisy1.mp4", "./daisy2.mp4", "./daisy3.mp4", "./daisy4.mp4", "./daisy5.mp4", "./daisy6.mp4", "./daisy7.mp4", "./daisy8.mp4"];

        for(let i=0; i<8; i++) {
            const vid = document.createElement('video');
            vid.src = myVideos[i] || 'https://www.w3schools.com/html/mov_bbb.mp4'; 
            vid.className = 'b-img'; 
            vid.muted = true; 
            vid.playsInline = true;
            vid.loop = true;
            grid.appendChild(vid);
        }

        // 3. Navigation with Display-Swap (Huge performance gain)
        const nameInput = document.getElementById('nameKey');
        nameInput.addEventListener('input', (e) => {
            if(e.target.value.toLowerCase() === 'daisy') {
                gsap.to("#stage1", { duration: 0.6, z: 500, opacity: 0, ease: "power2.in", onComplete: () => {
                    document.getElementById('stage1').style.display = 'none'; // Unload completely
                    showStage2();
                }});
            }
        });

        function showStage2() {
            const bgMusic = document.getElementById('bgMusic');
            bgMusic.play().catch(() => {});

            const s2 = document.getElementById('stage2');
            s2.style.visibility = 'visible';
            
            // Start videos ONLY when shown to save initial RAM
            document.querySelectorAll('video').forEach(v => v.play());

            gsap.from(s2, { duration: 1, z: -1000, opacity: 0, ease: "expo.out" });
            gsap.from(".b-img", { duration: 1.2, y: 300, opacity: 0, stagger: 0.08, ease: "back.out(1.5)" });
        }

        function toStage3() {
            gsap.to("#stage2", { duration: 0.6, rotationY: 90, opacity: 0, onComplete: () => {
                document.getElementById('stage2').style.display = 'none';
                const s3 = document.getElementById('stage3');
                s3.style.visibility = 'visible';
                gsap.from(s3, { duration: 0.8, rotationY: -90, opacity: 0, ease: "expo.out" });
            }});
        }

        function toStage4() {
            gsap.to("#stage3", { duration: 0.8, scale: 0.2, opacity: 0, ease: "back.in(1.7)", onComplete: () => {
                document.getElementById('stage3').style.display = 'none';
                const s4 = document.getElementById('stage4');
                s4.style.visibility = 'visible';
                gsap.from(s4, { duration: 1, y: 50, opacity: 0, ease: "power2.out" });
            }});
        }
    </script>
</body>
</html>
